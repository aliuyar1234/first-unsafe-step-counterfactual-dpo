train:
  method: fus_dpo
  base_model: Qwen/Qwen2.5-7B-Instruct
  quantization: 4bit
  seq_len: 4096
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  scheduler: cosine
  warmup_ratio: 0.1
  epochs: 1
  beta: 0.05
  gradient_checkpointing: true
  max_train_pairs: 150
  validate_every_fraction: 0.5
