train:
  method: sft_chosen
  base_model: Qwen/Qwen2.5-7B-Instruct
  precision: bf16
  seq_len: 4096
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  scheduler: cosine
  warmup_ratio: 0.1
  epochs: 1
  gradient_checkpointing: true
